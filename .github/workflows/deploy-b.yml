name: Deploy to AWS ECS (環境B)

# ============================================
# 環境B へのデプロイ
# - 手動トリガー（workflow_dispatch）のみ
# - mainブランチpush時には自動デプロイしない
# ============================================

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '環境Bにデプロイしますか？ (yes)'
        required: true
        default: 'yes'

env:
  AWS_REGION: ap-northeast-1
  ECR_REPOSITORY: m2-management-system-b
  ECS_CLUSTER: m2-cluster-b
  ECS_SERVICE: m2-service-b
  ECS_TASK_DEFINITION: .aws/task-definition-b.json

permissions:
  id-token: write
  contents: read

jobs:
  # ============================================
  # Job 1: テスト & 品質チェック
  # ============================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npx prisma generate

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

  # ============================================
  # Job 2: ビルド & デプロイ（環境B）
  # ============================================
  deploy:
    name: Build & Deploy (環境B)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (環境B)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_B }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:latest .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Render ECS task definition
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: ${{ env.ECS_TASK_DEFINITION }}
          container-name: app
          image: ${{ steps.build-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE }}
          cluster: ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true
